# En este fichero de extensión toml comentar/descomentar una linea es precederla/no precederla del símbolo #.
# Las distintas partes de la pagina web existen por la existencia de configuraciones, o porque estas tengan un interruptor a "true".
# Este fichero hugo.toml es el responsable de generar la página de inicio del sitio web.
# Lea cuidadosamente las opciones y modifiquelas para ver su efecto.

# Comente o descomente la variable baseurl según se encuentre desarrollando este sitio web en su ordenador o lo esté desplegando en github o un server de la Universidad de Sevilla.

# baseurl = "http://localhost" 
# baseurl = "https://personal.us.es/rjsevillano"
baseurl = "https://jescuderosic.github.io/personal-US-hugo-universal/"


title = "rjsevillano"
theme = "hugo-universal-theme"
themesDir = "./themes"
languageCode = "es-es"
# Site language. Available translations in the theme's `/i18n` directory.
defaultContentLanguage = "es"

# number of words of summarized post content (default 70)
summaryLength = 50

# not pluralize title pages by default
pluralizelisttitles = false

[services]
    # Enable comments by entering your Disqus shortname
    [services.disqus]
        shortname = "jescuderosic"
    # Enable Google Analytics by entering your tracking code
    [services.googleAnalytics]
        id = ""

# Define the number of posts per page
[pagination]
    pagerSize = 10

