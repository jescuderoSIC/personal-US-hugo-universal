    enable = true
    auto_play = true
    slide_speed = 2000
    pagination_speed = 1000

[params.biografia]
    enable = true
    title = "Algunos detalles sobre mí"
    texto = """
    <p>Ramón Jiménez Sevillano (Sevilla, 1972) es catedrático de Teoría de la Literatura y Literatura Comparada en la Universidad de Sevilla. Su carrera combina la pasión por la poesía y la pintura con una trayectoria internacional.</p>
    <p>Doctor en Filología, realizó una estancia postdoctoral en la Universidad de Tokio (2002-2004), donde estudió haiku y pintura sumi-e. Fue profesor titular en la Universidad de Sídney (2006-2009), investigando poesía y paisaje en el Pacífico, y profesor visitante en la Universidad de Buenos Aires (2012-2014), donde profundizó en la poesía de Pizarnik y la pintura de Berni.</p>
    <p>A lo largo de esos años fue publicando artículos en revistas de literatura comparada que le dieron proyección nacional e internacional. En 2015 regresó a Sevilla como profesor titular y continuó publicando hasta reunir los méritos suficientes para obtener, en 2023, la cátedra en su facultad de origen. Su obra más conocida es La mirada y el verbo: estéticas comparadas entre Oriente y Occidente (2020).</p>
    """
    foto = "img/profesor.jpg"
    alt = "Foto del profesor Ramón Jiménez Sevillano"

